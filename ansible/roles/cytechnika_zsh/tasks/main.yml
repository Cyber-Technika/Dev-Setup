---
- name: Install core packages
  become: true
  apt:
    update_cache: true
    name:
      - zsh
      - git
      - fzf
    state: present

- name: Ensure Oh My Zsh is installed (unattended)
  shell: |
    set -e
    if [ ! -d "$HOME/.oh-my-zsh" ]; then
      RUNZSH=no CHSH=no KEEP_ZSHRC=yes \
        sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)"
    fi
  args:
    executable: /bin/bash

- name: Ensure custom themes directory exists
  file:
    path: "{{ ansible_env.HOME }}/.oh-my-zsh/custom/themes"
    state: directory
    mode: "0755"

- name: Install CyTechnika theme
  copy:
    src: cytechnika.zsh-theme
    dest: "{{ ansible_env.HOME }}/.oh-my-zsh/custom/themes/cytechnika.zsh-theme"
    mode: "0644"

- name: Install zsh-autosuggestions
  git:
    repo: "https://github.com/zsh-users/zsh-autosuggestions"
    dest: "{{ ansible_env.HOME }}/.oh-my-zsh/custom/plugins/zsh-autosuggestions"
    version: master
    update: true

- name: Install zsh-syntax-highlighting
  git:
    repo: "https://github.com/zsh-users/zsh-syntax-highlighting.git"
    dest: "{{ ansible_env.HOME }}/.oh-my-zsh/custom/plugins/zsh-syntax-highlighting"
    version: master
    update: true

- name: Configure .zshrc (theme + plugins) idempotently
  blockinfile:
    path: "{{ ansible_env.HOME }}/.zshrc"
    create: true
    marker: "# {mark} CYTECHNIKA MANAGED BLOCK"
    block: |
      export ZSH="$HOME/.oh-my-zsh"
      ZSH_THEME="cytechnika"

      plugins=(
        git
        fzf
        zsh-autosuggestions
        zsh-syntax-highlighting
      )

      # Completion tweaks
      zstyle ':completion:*' menu select
      zstyle ':completion:*' matcher-list 'm:{a-z}={A-Za-z}'

      source $ZSH/oh-my-zsh.sh

- name: Set default shell to zsh for current user (best-effort)
  become: true
  user:
    name: "{{ ansible_user_id }}"
    shell: /usr/bin/zsh