---
- name: Add Sublime Text GPG key
  become: true
  ansible.builtin.apt_key:
    url: https://download.sublimetext.com/sublimehq-pub.gpg
    state: present

- name: Add Sublime Text APT repository
  become: true
  ansible.builtin.apt_repository:
    repo: "deb https://download.sublimetext.com/ apt/stable/"
    state: present

- name: Update apt cache
  become: true
  ansible.builtin.apt:
    update_cache: yes

- name: Install Sublime Text
  become: true
  ansible.builtin.apt:
    name: sublime-text
    state: present

- name: Install JetBrains Mono font
  become: true
  ansible.builtin.apt:
    name: fonts-jetbrains-mono
    state: present

- name: Ensure Sublime user config directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.config/sublime-text/Packages/User"
    state: directory
    mode: "0755"

- name: Deploy Sublime Preferences
  ansible.builtin.copy:
    src: Preferences.sublime-settings
    dest: "{{ ansible_env.HOME }}/.config/sublime-text/Packages/User/Preferences.sublime-settings"
    mode: "0644"
